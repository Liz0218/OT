<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Who Are You When You Are Not Busy?</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #F6F1E7;
    --river1: #5B8A72;
    --river2: #6D9F8C;
    --rock: #8A6A58;
    --wood: #C89B6D;
    --accent: #D97941;
    --ink: #2B2B2B;
    --ink-soft: #5A5650;
    --card: rgba(255,255,255,0.6);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:var(--bg); color:var(--ink); overflow-x:hidden; }
  .serif { font-family: 'Fraunces', serif; }
  #root { min-height:100vh; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:var(--river2); border-radius:4px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px);} to {opacity:1; transform:translateY(0);} }
  @keyframes fadeOut { from { opacity:1; transform:scale(1);} to {opacity:0; transform:scale(0.7);} }
  @keyframes floatCard { 0%,100% { transform:translateY(0px);} 50% { transform:translateY(-6px);} }
  @keyframes shimmer { 0% { background-position: -200% 0;} 100% { background-position: 200% 0;} }
  @keyframes softPulse { 0%,100% { opacity:0.85;} 50% { opacity:1;} }

  .anim-fadeUp { animation: fadeUp 0.5s ease forwards; }
  .anim-fadeOut { animation: fadeOut 0.6s ease forwards; }
  .anim-float { animation: floatCard 3.8s ease-in-out infinite; }

  .chip { transition: all 0.22s cubic-bezier(.4,0,.2,1); user-select:none; -webkit-user-select:none; }
  .chip:active { transform: scale(0.96); }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 10px;
    border-radius: 6px;
    background: #E5DDCB;
    outline: none;
    width: 100%;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--river1);
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(91,138,114,0.45);
    border: 4px solid white;
  }
  input[type=range]::-moz-range-thumb {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--river1);
    cursor: pointer;
    border: 4px solid white;
    box-shadow: 0 3px 10px rgba(91,138,114,0.45);
  }

  .glass-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--river1), #3F6B57);
    transition: all 0.22s ease;
  }
  .btn-primary:active { transform: scale(0.96); }

  .btn-accent {
    background: linear-gradient(135deg, var(--accent), #B85F2A);
    transition: all 0.22s ease;
  }
  .btn-accent:active { transform: scale(0.96); }

  .text-input {
    font-size: 22px;
    line-height: 1.4;
  }
  .text-input::placeholder { color: #B5AD9C; }

  .scenario-shimmer {
    background: linear-gradient(90deg, var(--river1) 0%, var(--river2) 50%, var(--river1) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.8s linear infinite;
  }

  .progress-dot { transition: all 0.3s ease; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------------------------- CONSTANTS ---------------------------- */

const ROLES_REMOVE = ["Clinician","Parent","Partner","Friend","Student","Manager","Carer","Homeowner","Athlete","Volunteer"];
const ROLE_CATEGORIES = ["Worker","Learner","Friend","Caregiver","Creator","Athlete","Volunteer","Partner","Community Member"];

const TIME_ACTIVITIES = [
  { name: "Work", color: "#5B8A72" },
  { name: "Sleep", color: "#6D5F8C" },
  { name: "Exercise", color: "#D97941" },
  { name: "Family", color: "#6D9F8C" },
  { name: "Social", color: "#D9A441" },
  { name: "Leisure", color: "#9D8189" },
  { name: "Admin", color: "#9A958A" },
  { name: "Commuting", color: "#7B96A0" },
  { name: "Recovery", color: "#C2766F" },
  { name: "Screen Time", color: "#5C6B73" },
];

const FUNCTIONS = ["Emotional regulation","Sensory regulation","Identity","Mastery","Escape","Connection","Routine"];

const FLOW_TYPES = [
  { name: "Fast & smooth", desc: "Energised, moving with ease" },
  { name: "Steady", desc: "Consistent, manageable pace" },
  { name: "Slowed", desc: "Tired, weighed down" },
  { name: "Stagnant", desc: "Stuck, little movement" },
  { name: "Chaotic", desc: "Turbulent, unpredictable" },
];

const ROCKS = ["Burnout","Fatigue","Illness","Grief","Financial pressure","Parenting","Anxiety","Cognitive overload","Role loss"];
const DRIFTWOOD = ["Humour","Family","Exercise","Dog","Creativity","Skills","Faith","Friends","Financial stability"];
const RIVERBANKS = ["Workplace","Housing","Healthcare system","Community","Culture","Transport","Family expectations"];

const SCENARIOS = [
  { name: "Retirement", lost: ["Worker role", "Daily structure", "Colleague connection"], impact: "Rocks added: Role loss, Identity gap" },
  { name: "Loss of driver's licence", lost: ["Independent mobility", "Spontaneous social access"], impact: "Riverbanks narrow: Transport restricted" },
  { name: "Dementia diagnosis", lost: ["Memory-dependent roles", "Some independence"], impact: "Flow becomes Chaotic, new rocks appear" },
  { name: "Autism burnout", lost: ["Masking capacity", "Social occupations"], impact: "Flow slows to Stagnant" },
  { name: "Major injury", lost: ["Physical occupations", "Work role temporarily"], impact: "Large rock added: physical limitation" },
  { name: "New parenthood", lost: ["Sleep", "Personal leisure time"], impact: "River reshaped entirely — new driftwood: Family" },
  { name: "Redundancy", lost: ["Worker identity", "Financial security", "Routine"], impact: "Riverbank collapses: Workplace removed" },
];

const SECTION_TITLES = [
  "Remove Your Labels",
  "Role Identity Map",
  "Time Use vs Meaning",
  "Secret Occupations",
  "Build Your River",
  "Life Event Simulator",
];

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

/* ---------------------------- PROGRESS BAR ---------------------------- */

function ProgressDots({ step, total, onJump }) {
  return (
    <div className="flex items-center justify-center gap-2 py-3">
      {Array.from({length: total}).map((_, i) => (
        <button
          key={i}
          onClick={() => onJump(i)}
          className="progress-dot rounded-full"
          style={{
            width: i === step ? '30px' : '10px',
            height: '10px',
            background: i === step ? 'var(--river1)' : (i < step ? 'var(--river2)' : '#E5DDCB'),
          }}
        />
      ))}
    </div>
  );
}

/* ---------------------------- SECTION SHELL ---------------------------- */

function Shell({ children, step, total, onJump, onNext, onBack, nextLabel, nextDisabled, hideNext }) {
  return (
    <div className="min-h-screen flex flex-col" style={{background: 'var(--bg)'}}>
      <div style={{padding: '16px 20px 0 20px'}}>
        <ProgressDots step={step} total={total} onJump={onJump} />
        <div style={{textAlign:'center', marginBottom:'6px'}}>
          <span style={{fontSize:'15px', letterSpacing:'0.08em', textTransform:'uppercase', color:'#A39B89', fontWeight:700}}>
            {step + 1} / {total}
          </span>
        </div>
        <h2 className="serif" style={{textAlign:'center', fontSize:'clamp(34px,9vw,48px)', color:'var(--ink)', fontWeight:600, lineHeight:1.1, margin:'0 0 18px 0'}}>
          {SECTION_TITLES[step]}
        </h2>
      </div>

      <div style={{flex:1, padding:'0 18px 20px 18px', display:'flex', flexDirection:'column', alignItems:'center', maxWidth:'640px', margin:'0 auto', width:'100%'}}>
        {children}
      </div>

      <div style={{padding:'14px 20px 28px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', maxWidth:'640px', margin:'0 auto', width:'100%'}}>
        <button
          onClick={onBack}
          disabled={step === 0}
          style={{fontSize:'20px', fontWeight:600, color:'#A39B89', opacity: step===0?0:1, transition:'opacity 0.2s', padding:'10px 6px', background:'none', border:'none'}}
        >
          ← Back
        </button>
        {!hideNext && (
          <button
            onClick={onNext}
            disabled={nextDisabled}
            className="btn-primary"
            style={{color:'white', padding:'16px 30px', borderRadius:'999px', fontWeight:700, fontSize:'22px', boxShadow:'0 8px 24px rgba(91,138,114,0.3)', border:'none', opacity: nextDisabled?0.4:1}}
          >
            {nextLabel || "Continue →"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ---------------------------- SECTION 1: REMOVE YOUR LABELS ---------------------------- */

function Section1({ data, setData }) {
  const [phase, setPhase] = useState(data.removed ? 2 : 0);
  const [selected, setSelected] = useState(data.selectedRoles || []);
  const [words, setWords] = useState(data.words || []);
  const [input, setInput] = useState("");

  const toggle = (role) => {
    setSelected(s => s.includes(role) ? s.filter(r => r !== role) : [...s, role]);
  };

  const removeLabels = () => {
    setPhase(1);
    setTimeout(() => {
      setPhase(2);
      setData(d => ({...d, selectedRoles: selected, removed: true}));
    }, 900);
  };

  const addWord = () => {
    if (!input.trim()) return;
    const w = input.trim();
    const newWords = [...words, w];
    setWords(newWords);
    setData(d => ({...d, words: newWords}));
    setInput("");
  };

  const freq = {};
  words.forEach(w => { const k = w.toLowerCase(); freq[k] = (freq[k]||0)+1; });
  const uniqueWords = [...new Set(words.map(w=>w.toLowerCase()))];

  if (phase === 0 || phase === 1) {
    return (
      <div className="anim-fadeUp" style={{width:'100%', display:'flex', flexDirection:'column', alignItems:'center'}}>
        <p style={{fontSize:'22px', color:'var(--ink-soft)', textAlign:'center', marginBottom:'22px', maxWidth:'480px', lineHeight:1.4}}>
          Select every role you carry day to day. Then we'll let them go.
        </p>
        <div style={{display:'flex', flexDirection:'column', gap:'12px', width:'100%', marginBottom:'28px'}}>
          {ROLES_REMOVE.map(role => {
            const isSelected = selected.includes(role);
            return (
              <button
                key={role}
                onClick={() => phase===0 && toggle(role)}
                className={`chip ${phase === 1 && isSelected ? 'anim-fadeOut' : ''}`}
                style={{
                  fontSize:'24px', fontWeight:600, padding:'18px 22px', borderRadius:'18px',
                  border: `2.5px solid ${isSelected ? 'var(--river1)' : '#E5DDCB'}`,
                  background: isSelected ? 'var(--river1)' : 'white',
                  color: isSelected ? 'white' : 'var(--ink-soft)',
                  width:'100%', textAlign:'left'
                }}
              >
                {role}
              </button>
            );
          })}
        </div>
        {phase === 0 && (
          <button
            onClick={removeLabels}
            disabled={selected.length === 0}
            className="btn-primary"
            style={{color:'white', padding:'18px 36px', borderRadius:'999px', fontWeight:700, fontSize:'24px', boxShadow:'0 8px 24px rgba(91,138,114,0.3)', border:'none', opacity:selected.length===0?0.3:1, width:'100%'}}
          >
            Let them go ✦
          </button>
        )}
      </div>
    );
  }

  return (
    <div className="anim-fadeUp" style={{width:'100%', display:'flex', flexDirection:'column', alignItems:'center'}}>
      <p className="serif" style={{fontSize:'clamp(28px,7.5vw,38px)', color:'var(--ink)', textAlign:'center', fontStyle:'italic', lineHeight:1.25, marginBottom:'24px'}}>
        "Which role would hurt most to lose?"
      </p>

      <div style={{display:'flex', gap:'10px', width:'100%', marginBottom:'22px'}}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addWord()}
          placeholder="One word or phrase..."
          className="text-input"
          style={{flex:1, padding:'16px 20px', borderRadius:'999px', border:'2.5px solid #E5DDCB', outline:'none', background:'white'}}
        />
        <button onClick={addWord} className="btn-primary" style={{color:'white', padding:'0 22px', borderRadius:'999px', fontWeight:700, fontSize:'20px', border:'none'}}>
          Add
        </button>
      </div>

      <div className="glass-card" style={{borderRadius:'28px', padding:'24px', width:'100%', minHeight:'160px', display:'flex', flexWrap:'wrap', gap:'14px', alignItems:'center', justifyContent:'center', alignContent:'center'}}>
        {words.length === 0 && (
          <span style={{color:'#B5AD9C', fontSize:'20px', fontStyle:'italic'}}>Your words will gather here...</span>
        )}
        {uniqueWords.map((w, i) => {
          const size = clamp(20 + freq[w]*10, 20, 52);
          const colors = ['#5B8A72','#6D9F8C','#D97941','#6D5F8C','#9D8189'];
          return (
            <span
              key={w+i}
              className="serif anim-fadeUp"
              style={{fontSize: `${size}px`, fontWeight:600, color: colors[i % colors.length], animationDelay: `${i*0.05}s`}}
            >
              {w}
            </span>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------- SECTION 2: ROLE IDENTITY MAP ---------------------------- */

function RadarChart({ values, id }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ROLE_CATEGORIES,
        datasets: [{
          data: ROLE_CATEGORIES.map(c => values[c] || 0),
          backgroundColor: 'rgba(91,138,114,0.25)',
          borderColor: '#5B8A72',
          borderWidth: 3,
          pointBackgroundColor: '#5B8A72',
          pointRadius: 5,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        animation: { duration: 500 },
        plugins: { legend: { display: false } },
        scales: {
          r: {
            min: 0, max: 10,
            ticks: { display: false },
            grid: { color: '#E5DDCB' },
            angleLines: { color: '#E5DDCB' },
            pointLabels: { font: { size: 13, weight: '700' }, color: '#5A5650' }
          }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(values)]);

  return <canvas ref={canvasRef} id={id}></canvas>;
}

function Section2({ data, setData }) {
  const [values, setValues] = useState(data.roleValues || Object.fromEntries(ROLE_CATEGORIES.map(c => [c, 5])));
  const [grown, setGrown] = useState(data.grown || null);
  const [faded, setFaded] = useState(data.faded || null);

  const update = (cat, val) => {
    const nv = {...values, [cat]: parseInt(val)};
    setValues(nv);
    setData(d => ({...d, roleValues: nv}));
  };

  return (
    <div className="anim-fadeUp" style={{width:'100%'}}>
      <p style={{fontSize:'22px', color:'var(--ink-soft)', textAlign:'center', marginBottom:'18px', lineHeight:1.4}}>
        Rate identity importance from 0–10
      </p>
      <div className="glass-card" style={{borderRadius:'28px', padding:'18px', marginBottom:'24px', display:'flex', justifyContent:'center'}}>
        <div style={{maxWidth:'320px', width:'100%'}}>
          <RadarChart values={values} id="radar1" />
        </div>
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:'20px', marginBottom:'28px'}}>
        {ROLE_CATEGORIES.map(cat => (
          <div key={cat}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}>
              <span style={{fontSize:'22px', fontWeight:600, color:'var(--ink)'}}>{cat}</span>
              <span style={{fontSize:'22px', fontWeight:800, color:'var(--river1)'}}>{values[cat]}</span>
            </div>
            <input
              type="range" min="0" max="10" value={values[cat]}
              onChange={e => update(cat, e.target.value)}
            />
          </div>
        ))}
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:'24px'}}>
        <div>
          <p style={{fontSize:'22px', fontWeight:600, color:'var(--ink)', marginBottom:'12px', lineHeight:1.3}}>Which role has grown most in the last 5 years?</p>
          <div style={{display:'flex', flexWrap:'wrap', gap:'10px'}}>
            {ROLE_CATEGORIES.map(c => (
              <button key={c} onClick={() => { setGrown(c); setData(d=>({...d, grown: c})); }}
                className="chip"
                style={{fontSize:'18px', fontWeight:600, padding:'10px 16px', borderRadius:'999px', border:`2px solid ${grown===c?'var(--river2)':'#E5DDCB'}`, background: grown===c?'var(--river2)':'white', color: grown===c?'white':'var(--ink-soft)'}}>
                {c}
              </button>
            ))}
          </div>
        </div>
        <div>
          <p style={{fontSize:'22px', fontWeight:600, color:'var(--ink)', marginBottom:'12px', lineHeight:1.3}}>Which role has faded?</p>
          <div style={{display:'flex', flexWrap:'wrap', gap:'10px'}}>
            {ROLE_CATEGORIES.map(c => (
              <button key={c} onClick={() => { setFaded(c); setData(d=>({...d, faded: c})); }}
                className="chip"
                style={{fontSize:'18px', fontWeight:600, padding:'10px 16px', borderRadius:'999px', border:`2px solid ${faded===c?'var(--accent)':'#E5DDCB'}`, background: faded===c?'var(--accent)':'white', color: faded===c?'white':'var(--ink-soft)'}}>
                {c}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------- SECTION 3: TIME VS MEANING ---------------------------- */

function Section3({ data, setData }) {
  const hours = Array.from({length: 24}, (_,i) => i);
  const [assignments, setAssignments] = useState(data.timeAssignments || {});
  const [selectedActivity, setSelectedActivity] = useState(null);
  const [meaningful, setMeaningful] = useState(data.meaningfulActivity || null);

  const assign = (hour) => {
    if (!selectedActivity) return;
    const na = {...assignments, [hour]: selectedActivity};
    setAssignments(na);
    setData(d => ({...d, timeAssignments: na}));
  };

  const totals = {};
  Object.values(assignments).forEach(a => { totals[a] = (totals[a]||0) + 1; });

  return (
    <div className="anim-fadeUp" style={{width:'100%'}}>
      <p style={{fontSize:'22px', color:'var(--ink-soft)', textAlign:'center', marginBottom:'18px', lineHeight:1.4}}>
        Pick an activity, then tap hours to fill your day.
      </p>
      <div style={{display:'flex', flexWrap:'wrap', gap:'8px', justifyContent:'center', marginBottom:'22px'}}>
        {TIME_ACTIVITIES.map(act => (
          <button
            key={act.name}
            onClick={() => setSelectedActivity(act.name)}
            className="chip"
            style={{
              fontSize:'18px', fontWeight:700, padding:'10px 16px', borderRadius:'999px',
              border: `2.5px solid ${selectedActivity===act.name ? act.color : '#E5DDCB'}`,
              background: selectedActivity===act.name ? act.color : 'white',
              color: selectedActivity===act.name ? 'white' : 'var(--ink-soft)',
              display:'flex', alignItems:'center', gap:'8px'
            }}
          >
            <span style={{width:'10px', height:'10px', borderRadius:'50%', background: selectedActivity===act.name?'white':act.color}}></span>
            {act.name}
          </button>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'8px', marginBottom:'26px'}}>
        {hours.map(h => {
          const act = assignments[h];
          const color = act ? TIME_ACTIVITIES.find(a=>a.name===act)?.color : '#EDE6D6';
          return (
            <button
              key={h}
              onClick={() => assign(h)}
              style={{
                aspectRatio:'1', borderRadius:'14px', display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'15px', fontWeight:700, background: color, color: act ? 'white' : '#A39B89', border:'none'
              }}
            >
              {h}:00
            </button>
          );
        })}
      </div>

      {Object.keys(totals).length > 0 && (
        <div className="glass-card" style={{borderRadius:'24px', padding:'20px', marginBottom:'24px'}}>
          <p style={{fontSize:'16px', fontWeight:800, color:'#A39B89', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:'14px'}}>Hours allocated</p>
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
            {Object.entries(totals).map(([name, count]) => {
              const color = TIME_ACTIVITIES.find(a=>a.name===name)?.color;
              return (
                <div key={name}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}>
                    <span style={{fontSize:'18px', color:'var(--ink)', fontWeight:600}}>{name}</span>
                    <span style={{fontSize:'18px', fontWeight:800, color:'#A39B89'}}>{count}h</span>
                  </div>
                  <div style={{height:'10px', borderRadius:'999px', background:'#EDE6D6', overflow:'hidden'}}>
                    <div style={{height:'100%', borderRadius:'999px', width: `${(count/24)*100}%`, background: color, transition:'width 0.3s'}}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div>
        <p style={{fontSize:'22px', fontWeight:600, color:'var(--ink)', textAlign:'center', marginBottom:'14px', lineHeight:1.3}}>Which activity gives you the most meaning?</p>
        <div style={{display:'flex', flexWrap:'wrap', gap:'10px', justifyContent:'center'}}>
          {TIME_ACTIVITIES.map(act => (
            <button key={act.name} onClick={() => { setMeaningful(act.name); setData(d=>({...d, meaningfulActivity: act.name})); }}
              className="chip"
              style={{fontSize:'18px', fontWeight:600, padding:'10px 16px', borderRadius:'999px', border:`2px solid ${meaningful===act.name?act.color:'#E5DDCB'}`, background: meaningful===act.name?act.color:'white', color: meaningful===act.name?'white':'var(--ink-soft)'}}>
              {act.name}
            </button>
          ))}
        </div>
        {meaningful && totals[meaningful] !== undefined && totals[meaningful] <= 2 && (
          <p style={{textAlign:'center', fontSize:'18px', color:'var(--accent)', marginTop:'16px', fontStyle:'italic', lineHeight:1.4}}>
            ⚡ {meaningful} gives you the most meaning, but only got {totals[meaningful]||0} hour{totals[meaningful]===1?'':'s'} today.
          </p>
        )}
      </div>

/* ---------------------------- SECTION 5: BUILD YOUR RIVER (KAWA) — REDESIGNED ---------------------------- */

// Generate an organic winding centerline using sine layering for a natural meander
function generateRiverPath(width, height, turbulence, seed=0) {
  const points = [];
  const segments = 28;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const x = t * width;
    const baseY = height * 0.5;
    const meander = Math.sin(t * Math.PI * 2.2 + seed) * (height * 0.16)
                  + Math.sin(t * Math.PI * 5 + seed * 1.7) * (height * 0.05 * turbulence);
    points.push({ x, y: baseY + meander });
  }
  return points;
}

function smoothPath(points) {
  if (points.length < 2) return '';
  let d = `M ${points[0].x},${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i];
    const p1 = points[i+1];
    const midX = (p0.x + p1.x) / 2;
    const midY = (p0.y + p1.y) / 2;
    d += ` Q ${p0.x},${p0.y} ${midX},${midY}`;
  }
  const last = points[points.length-1];
  d += ` L ${last.x},${last.y}`;
  return d;
}

function RiverCanvas({ flow, rocks, driftwood, banks }) {
  const W = 380, H = 460;

  const flowConfig = {
    "Fast & smooth": { turbulence: 0.5, baseWidth: 92, speed: 2.2, opacity: 0.95 },
    "Steady":        { turbulence: 0.8, baseWidth: 76, speed: 4,   opacity: 0.92 },
    "Slowed":        { turbulence: 1.1, baseWidth: 58, speed: 7,   opacity: 0.85 },
    "Stagnant":       { turbulence: 0.3, baseWidth: 40, speed: 16,  opacity: 0.7 },
    "Chaotic":        { turbulence: 2.4, baseWidth: 70, speed: 1.4, opacity: 0.95 },
  };
  const cfg = flowConfig[flow] || flowConfig["Steady"];

  const bankFactor = clamp(1 - banks.length * 0.06, 0.55, 1);
  const rockFactor = clamp(1 - rocks.length * 0.025, 0.7, 1);
  const riverWidth = cfg.baseWidth * bankFactor * rockFactor;

  // vertical river (top to bottom) so it reads naturally on a tall phone screen
  const centerline = generateRiverPath(H, W, cfg.turbulence, 1.3).map(p => ({ x: p.y, y: p.x }));
  const pathD = smoothPath(centerline);

  // bank curve offsets — wider/narrower landscape based on selected riverbank factors
  const bankWidthExtra = banks.length * 14;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:'auto', display:'block'}}>
      <defs>
        <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6D9F8C" />
          <stop offset="55%" stopColor="#5B8A72" />
          <stop offset="100%" stopColor="#4A7A60" />
        </linearGradient>
        <linearGradient id="landGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#EFE7D4" />
          <stop offset="100%" stopColor="#E5DABF" />
        </linearGradient>
        <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
          <stop offset="60%" stopColor="#F6F1E7" stopOpacity="0" />
          <stop offset="100%" stopColor="#E8DEC8" stopOpacity="0.6" />
        </radialGradient>
        <filter id="softBlur"><feGaussianBlur stdDeviation="1.2" /></filter>
        <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="white" stopOpacity="0.35" />
          <stop offset="100%" stopColor="white" stopOpacity="0" />
        </linearGradient>
      </defs>

      {/* landscape background */}
      <rect x="0" y="0" width={W} height={H} fill="url(#landGrad)" />

      {/* subtle contour texture lines representing terrain shaped by riverbanks */}
      {banks.map((b, i) => (
        <path
          key={b}
          d={`M ${-20 + i*8},0 C ${W*0.3},${H*0.2+i*10} ${W*0.7},${H*0.6-i*8} ${W+20},${H}`}
          stroke="#DCD0AF"
          strokeWidth="1"
          fill="none"
          opacity="0.5"
        />
      ))}

      {/* river bed shadow for depth */}
      <path d={pathD} stroke="#3E6B53" strokeWidth={riverWidth + bankWidthExtra + 10} fill="none" strokeLinecap="round" opacity="0.25" filter="url(#softBlur)" />

      {/* main river body */}
      <path
        d={pathD}
        stroke="url(#riverGrad)"
        strokeWidth={riverWidth + bankWidthExtra}
        fill="none"
        strokeLinecap="round"
        opacity={cfg.opacity}
      >
        {flow !== 'Stagnant' && (
          <animate attributeName="stroke-dashoffset" from="0" to="-200" dur={`${cfg.speed}s`} repeatCount="indefinite" />
        )}
        <animate attributeName="d" values={`${pathD};${smoothPath(generateRiverPath(H, W, cfg.turbulence, 2.6).map(p => ({x:p.y,y:p.x})))};${pathD}`} dur={`${cfg.speed*2.2}s`} repeatCount="indefinite" />
      </path>
      <path d={pathD} stroke="url(#shine)" strokeWidth={(riverWidth + bankWidthExtra)*0.4} fill="none" strokeLinecap="round" opacity="0.5">
        <animate attributeName="d" values={`${pathD};${smoothPath(generateRiverPath(H, W, cfg.turbulence, 2.6).map(p => ({x:p.y,y:p.x})))};${pathD}`} dur={`${cfg.speed*2.2}s`} repeatCount="indefinite" />
      </path>

      {/* gentle water shimmer ripples */}
      {flow !== 'Stagnant' && Array.from({length:5}).map((_,i) => {
        const t = (i+0.5)/5;
        const pt = centerline[Math.floor(t*centerline.length)];
        return pt ? (
          <ellipse key={i} cx={pt.x} cy={pt.y} rx="3" ry="1.4" fill="white" opacity="0.4">
            <animate attributeName="opacity" values="0;0.5;0" dur={`${2.5+i*0.4}s`} repeatCount="indefinite" begin={`${i*0.5}s`} />
            <animate attributeName="cy" values={`${pt.y};${pt.y+H*0.18};${pt.y+H*0.36}`} dur={`${cfg.speed*1.3}s`} repeatCount="indefinite" begin={`${i*0.5}s`} />
          </ellipse>
        ) : null;
      })}

      {/* rocks — natural irregular stone shapes nestled in river */}
      {rocks.map((r, i) => {
        const t = (i+1)/(rocks.length+1);
        const pt = centerline[Math.floor(t*centerline.length)] || {x:W/2,y:H/2};
        const sz = 10 + (i%3)*4;
        return (
          <g key={r} transform={`translate(${pt.x + (i%2===0?-14:14)}, ${pt.y})`}>
            <path d={`M ${-sz},0 Q ${-sz*0.6},${-sz} 0,${-sz*0.8} Q ${sz*0.7},${-sz*0.9} ${sz},${-sz*0.1} Q ${sz*0.8},${sz*0.7} 0,${sz*0.8} Q ${-sz*0.9},${sz*0.6} ${-sz},0 Z`}
              fill="#8A6A58" opacity="0.92" />
            <path d={`M ${-sz*0.6},${-sz*0.3} Q 0,${-sz*0.6} ${sz*0.5},${-sz*0.2}`} stroke="#A1816C" strokeWidth="1.5" fill="none" opacity="0.6" />
          </g>
        );
      })}

      {/* driftwood — drifting timber pieces */}
      {driftwood.map((d, i) => {
        const t = (i+0.7)/(driftwood.length+1);
        const pt = centerline[Math.floor(t*centerline.length)] || {x:W/2,y:H/2};
        return (
          <g key={d} transform={`translate(${pt.x + (i%2===0?16:-16)}, ${pt.y})`}>
            <rect x="-11" y="-2.5" width="22" height="5" rx="2.5" fill="#C89B6D" opacity="0.95" transform={`rotate(${(i*23)%40-20})`}>
              <animateTransform attributeName="transform" type="translate" values="0,0; 0,8; 0,0" dur={`${3+i*0.6}s`} repeatCount="indefinite" additive="sum" />
            </rect>
          </g>
        );
      })}

      <rect x="0" y="0" width={W} height={H} fill="url(#vignette)" />
    </svg>
  );
}

        fontSize:'20px', fontWeight:600, padding:'12px 18px', borderRadius:'999px',

        background: selected ? accent : 'white',
        color: selected ? 'white' : 'var(--ink-soft)',
      }}
    >
      {label}
    </button>
  );
}

  const [rocks, setRocks] = useState(data.rocks || []);
  const [driftwood, setDriftwood] = useState(data.driftwood || []);
  const [banks, setBanks] = useState(data.banks || []);

    setArr(na);
    setData(d => ({...d, [key]: na}));
  };

  const subSteps = [
    { label: "Water Flow", desc: "How is your river moving right now?", accent: "#5B8A72" },
    { label: "Rocks", desc: "What restricts your flow?", accent: "#8A6A58" },

  return (
    <div className="anim-fadeUp" style={{width:'100%'}}>
      <div className="glass-card" style={{borderRadius:'28px', padding:'14px', marginBottom:'20px', overflow:'hidden'}}>

      <div style={{display:'flex', gap:'8px', justifyContent:'center', marginBottom:'18px', flexWrap:'wrap'}}>

          <button key={i} onClick={() => setStep(i)}
            style={{padding:'8px 14px', borderRadius:'999px', fontSize:'15px', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.03em', border:'none',
              background: step===i?s.accent:'#EDE6D6', color: step===i?'white':'#A39B89'}}>
            {s.label}
          </button>
        ))}
      </div>

      <p style={{fontSize:'26px', fontWeight:700, color:'var(--ink)', textAlign:'center', marginBottom:'4px', lineHeight:1.2}}>{subSteps[step].label}</p>
      <p style={{fontSize:'19px', color:'var(--ink-soft)', textAlign:'center', marginBottom:'18px', lineHeight:1.4}}>{subSteps[step].desc}</p>

      <div style={{display:'flex', flexWrap:'wrap', gap:'10px', justifyContent:'center', marginBottom:'20px'}}>
        {step === 0 && FLOW_TYPES.map(f => (
          <button key={f.name} onClick={() => { setFlow(f.name); setData(d=>({...d, flow: f.name})); }}
            className="chip"
            style={{padding:'14px 18px', borderRadius:'18px', border:`2.5px solid ${flow===f.name?'#5B8A72':'#E5DDCB'}`, background: flow===f.name?'rgba(91,138,114,0.12)':'white', textAlign:'left', minWidth:'150px'}}>
            <div style={{fontSize:'20px', fontWeight:700, color: flow===f.name?'#5B8A72':'var(--ink-soft)'}}>{f.name}</div>
            <div style={{fontSize:'15px', color:'#A39B89', marginTop:'2px'}}>{f.desc}</div>
          </button>
        ))}
        {step === 1 && ROCKS.map(r => (
          <DragChip key={r} label={r} selected={rocks.includes(r)} accent="#8A6A58" onSelect={() => toggleArr(rocks, setRocks, r, 'rocks')} />
        ))}
        {step === 2 && DRIFTWOOD.map(d => (
          <DragChip key={d} label={d} selected={driftwood.includes(d)} accent="#C89B6D" onSelect={() => toggleArr(driftwood, setDriftwood, d, 'driftwood')} />
        ))}
        {step === 3 && RIVERBANKS.map(b => (
          <DragChip key={b} label={b} selected={banks.includes(b)} accent="#D97941" onSelect={() => toggleArr(banks, setBanks, b, 'banks')} />
        ))}
      </div>

      {step < 3 && (
        <div style={{display:'flex', justifyContent:'center'}}>
          <button onClick={() => setStep(step+1)} style={{fontSize:'19px', fontWeight:700, color:'var(--river1)', textDecoration:'underline', background:'none', border:'none'}}>
            Next: {subSteps[step+1].label} →
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------------------------- SECTION 6: LIFE EVENT + SUMMARY ---------------------------- */

function Section6({ data }) {
  const [scenario, setScenario] = useState(data.scenario || null);
  const [spinning, setSpinning] = useState(false);
  const [reflections, setReflections] = useState({ changed: "", lost: "", challenged: "" });

  const triggerScenario = () => {
    setSpinning(true);
    setTimeout(() => {
      const s = SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
      setScenario(s);
      setSpinning(false);
    }, 1200);
  };

  const downloadSnapshot = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 800; canvas.height = 1000;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#F6F1E7';
    ctx.fillRect(0,0,800,1000);
    ctx.fillStyle = '#2B2B2B';
    ctx.font = 'bold 36px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Who Are You When You Are Not Busy?', 400, 80);
    ctx.font = '20px Georgia';
    ctx.fillStyle = '#5A5650';
    ctx.fillText('A snapshot of your river', 400, 118);

    let y = 190;
    ctx.textAlign = 'left';
    ctx.font = 'bold 22px Georgia';
    ctx.fillStyle = '#5B8A72';
    ctx.fillText('Flow:', 80, y); ctx.font = '20px Georgia'; ctx.fillStyle='#2B2B2B'; ctx.fillText(data.flow || '—', 220, y);
    y += 48;
    ctx.font = 'bold 22px Georgia'; ctx.fillStyle = '#8A6A58';
    ctx.fillText('Rocks:', 80, y); ctx.font = '18px Georgia'; ctx.fillStyle='#2B2B2B';
    ctx.fillText((data.rocks||[]).join(', ') || '—', 220, y);
    y += 48;
    ctx.font = 'bold 22px Georgia'; ctx.fillStyle = '#C89B6D';
    ctx.fillText('Driftwood:', 80, y); ctx.font = '18px Georgia'; ctx.fillStyle='#2B2B2B';
    ctx.fillText((data.driftwood||[]).join(', ') || '—', 220, y);
    y += 48;
    ctx.font = 'bold 22px Georgia'; ctx.fillStyle = '#D97941';
    ctx.fillText('Riverbanks:', 80, y); ctx.font = '18px Georgia'; ctx.fillStyle='#2B2B2B';
    ctx.fillText((data.banks||[]).join(', ') || '—', 220, y);

    y += 80;
    ctx.font = 'italic 18px Georgia';
    ctx.fillStyle = '#5A5650';
    ctx.fillText('"This is what occupational therapists explore', 80, y);
    ctx.fillText('when understanding everyday life."', 80, y+28);

    const link = document.createElement('a');
    link.download = 'my-river-snapshot.png';
    link.href = canvas.toDataURL();
    link.click();
  };

  return (
    <div className="anim-fadeUp" style={{width:'100%'}}>
      <div style={{textAlign:'center', marginBottom:'18px'}}>
        <button
          onClick={triggerScenario}
          className="btn-accent"
          style={{color:'white', padding:'18px 32px', borderRadius:'999px', fontWeight:700, fontSize:'24px', boxShadow:'0 8px 24px rgba(217,121,65,0.35)', border:'none', width:'100%'}}
        >
          {spinning ? "Changing the river..." : "Change the River 🌊"}
        </button>
      </div>

      {spinning && (
        <div className="scenario-shimmer" style={{height:'8px', width:'100%', borderRadius:'999px', marginBottom:'22px'}}></div>
      )}

      {scenario && !spinning && (
        <div className="glass-card anim-fadeUp" style={{borderRadius:'24px', padding:'22px', marginBottom:'24px'}}>
          <p className="serif" style={{fontSize:'26px', fontWeight:700, color:'var(--ink)', marginBottom:'8px'}}>{scenario.name}</p>
          <p style={{fontSize:'17px', color:'#A39B89', marginBottom:'10px'}}>{scenario.impact}</p>
          <p style={{fontSize:'17px', fontWeight:700, color:'var(--ink-soft)', marginBottom:'6px'}}>What may be lost:</p>
          <div style={{display:'flex', flexWrap:'wrap', gap:'8px'}}>
            {scenario.lost.map(l => (
              <span key={l} style={{padding:'8px 14px', borderRadius:'999px', fontSize:'16px', background:'rgba(217,121,65,0.1)', color:'#B85F2A', border:'1.5px solid rgba(217,121,65,0.3)'}}>{l}</span>
            ))}
          </div>

          <div style={{marginTop:'18px', display:'flex', flexDirection:'column', gap:'10px'}}>
            <input placeholder="What changed?" value={reflections.changed}
              onChange={e=>setReflections({...reflections, changed:e.target.value})}
              className="text-input" style={{width:'100%', padding:'14px 16px', borderRadius:'14px', border:'2px solid #E5DDCB', outline:'none', background:'white'}} />
            <input placeholder="What occupations were lost?" value={reflections.lost}
              onChange={e=>setReflections({...reflections, lost:e.target.value})}
              className="text-input" style={{width:'100%', padding:'14px 16px', borderRadius:'14px', border:'2px solid #E5DDCB', outline:'none', background:'white'}} />
            <input placeholder="What identities were challenged?" value={reflections.challenged}
              onChange={e=>setReflections({...reflections, challenged:e.target.value})}
              className="text-input" style={{width:'100%', padding:'14px 16px', borderRadius:'14px', border:'2px solid #E5DDCB', outline:'none', background:'white'}} />
          </div>
        </div>
      )}

      <div className="glass-card" style={{borderRadius:'28px', padding:'20px', marginBottom:'20px'}}>
        <p className="serif" style={{fontSize:'26px', fontWeight:700, color:'var(--ink)', textAlign:'center', marginBottom:'16px'}}>Your Journey Summary</p>

        <div style={{maxWidth:'260px', margin:'0 auto 16px auto'}}>
          <RadarChart values={data.roleValues || {}} id="radarSummary" />
        </div>

        <div style={{borderRadius:'20px', overflow:'hidden'}}>
          <RiverCanvas flow={data.flow || "Steady"} rocks={data.rocks||[]} driftwood={data.driftwood||[]} banks={data.banks||[]} />
        </div>

        <div style={{fontSize:'18px', color:'var(--ink-soft)', marginTop:'16px', display:'flex', flexDirection:'column', gap:'6px'}}>
          <p><span style={{fontWeight:700, color:'var(--ink)'}}>Grown role:</span> {data.grown || "—"}</p>
          <p><span style={{fontWeight:700, color:'var(--ink)'}}>Faded role:</span> {data.faded || "—"}</p>
          <p><span style={{fontWeight:700, color:'var(--ink)'}}>Most meaningful activity:</span> {data.meaningfulActivity || "—"}</p>
        </div>

        <p className="serif" style={{fontSize:'19px', fontStyle:'italic', color:'#A39B89', textAlign:'center', marginTop:'20px', lineHeight:1.4}}>
          "This is what occupational therapists explore when understanding everyday life."
        </p>
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
        <button onClick={downloadSnapshot} className="btn-primary" style={{color:'white', padding:'16px', borderRadius:'999px', fontSize:'20px', fontWeight:700, border:'none'}}>
          ⬇ Download Snapshot
        </button>
        <button onClick={() => window.location.reload()} style={{padding:'16px', borderRadius:'999px', fontSize:'20px', fontWeight:700, border:'2.5px solid #E5DDCB', color:'var(--ink-soft)', background:'white'}}>
          ↺ Reset
        </button>
      </div>
    </div>
  );
}

/* ---------------------------- MAIN APP ---------------------------- */

function App() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({});
  const total = 6;

  const next = () => setStep(s => Math.min(total-1, s+1));
  const back = () => setStep(s => Math.max(0, s-1));
  const jump = (i) => setStep(i);

  const sections = [
    <Section1 data={data} setData={setData} />,
    <Section2 data={data} setData={setData} />,
    <Section3 data={data} setData={setData} />,
    <Section4 data={data} setData={setData} />,
    <Section5 data={data} setData={setData} />,
    <Section6 data={data} />,
  ];

  return (
    <Shell
      step={step} total={total} onJump={jump} onNext={next} onBack={back}
      hideNext={step === total-1}
      nextLabel="Continue →"
    >
      {sections[step]}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
